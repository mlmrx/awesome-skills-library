name: Validate skills

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Validate third-party attribution
        run: python scripts/validate_attribution.py

      - name: Generate skills index
        run: python scripts/generate_index.py

      - name: Generate import report
        run: python scripts/generate_import_report.py
