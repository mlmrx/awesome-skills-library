id: agent-infra.agentfacts-profile
name: AgentFacts Profile
version: 0.1.0
category: agent-infra
description: Create an evidence-grounded AgentFacts-style profile for an AI agent, including capabilities, contracts, trust claims, verification status, risks, and explicit review gaps.
use_cases:
  - Profile an AI agent before integration into a workflow or registry.
  - Convert scattered agent documentation into a structured, reviewable capability package summary.
  - Identify unsupported claims, missing ownership details, and verification gaps before relying on an agent.
inputs:
  - name: target_agent_name
    description: Name or stable identifier of the agent being profiled.
  - name: agent_description
    description: Available documentation, marketing copy, README content, manifest data, or other claims about the target agent.
  - name: evidence
    description: Sources, links, notes, or reviewer observations supporting ownership, capabilities, trust claims, limitations, and operational context.
outputs:
  - name: agentfacts_profile
    description: Structured Markdown profile covering identity, owner/operator, purpose, capabilities, input and output contracts, trust claims, verification metadata, risk notes, human review recommendation, and verification gaps.
required_tools:
  - none
permissions:
  network: false
  filesystem: false
  code_execution: false
  external_api: false
  user_data_access: false
safety_level: medium
risk_tags:
  - misrepresentation
  - trust-claims
  - human-review-required
  - privacy
compatibility:
  generic_agents: supported
  claude_skills: experimental
  chatgpt_skills: experimental
  mcp: not_supported
  nanda_agentfacts: experimental
provenance:
  author: Awesome Skills Library maintainers
  source: Initial Awesome Skills Library sample skill for registry-oriented agent profile drafting.
  references:
    - docs/compatibility.md
    - docs/safety-and-risk.md
license: CC0-1.0
maintainers:
  - name: Awesome Skills Library maintainers
    contact: https://github.com/awesome-skills-library/awesome-skills-library/issues
tests:
  - tests/basic.yaml
